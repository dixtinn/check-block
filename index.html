<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="color-scheme" content="dark" />
    <title>Detector de Bloqueos</title>
    <link rel="stylesheet" href="./styles.css?v=20260605-8" />
  </head>
  <body>
    <main class="app-shell">
      <section class="hero-panel" aria-labelledby="app-title">
        <div class="brand-mark" aria-hidden="true">
          <i data-lucide="shield-check"></i>
        </div>
        <div class="title-group">
          <p class="eyebrow">Diagnostico de conectividad</p>
          <h1 id="app-title">Detector de Bloqueos</h1>
        </div>
      </section>

      <section class="control-panel" aria-label="Configuracion de prueba">
        <form id="access-form" class="access-form">
          <label for="access-code">Codigo de acceso</label>
          <div class="input-row">
            <input
              id="access-code"
              name="access-code"
              type="text"
              inputmode="text"
              autocomplete="one-time-code"
              placeholder="cliente-001"
              required
            />
            <button id="start-button" class="button button-primary" type="submit">
              <i data-lucide="play"></i>
              <span>Iniciar</span>
            </button>
          </div>
        </form>

        <div class="status-strip" role="status" aria-live="polite">
          <div>
            <span class="muted">Estado</span>
            <strong id="status-text">Listo</strong>
          </div>
        </div>

        <div class="progress-track" aria-hidden="true">
          <div id="progress-bar" class="progress-bar"></div>
        </div>
      </section>

      <section class="summary-grid visually-hidden" aria-label="Resumen">
        <article>
          <span>IP cliente</span>
          <strong id="client-ip">Pendiente</strong>
        </article>
        <article>
          <span>User Agent</span>
          <strong id="client-agent">Pendiente</strong>
        </article>
      </section>

      <section class="results-panel" aria-label="Reporte">
        <div class="section-heading">
          <h2>Reporte</h2>
          <div class="actions">
            <button id="pdf-button" class="button button-ghost" type="button" disabled>
              <i data-lucide="file-down"></i>
              <span>PDF</span>
            </button>
            <button id="json-button" class="button button-ghost" type="button" disabled>
              <i data-lucide="download"></i>
              <span>JSON</span>
            </button>
            <button id="share-button" class="button icon-button" type="button" disabled aria-label="Compartir reporte">
              <i data-lucide="share-2"></i>
            </button>
          </div>
        </div>
        <div id="results-list" class="results-list empty-state">
          <i data-lucide="radar"></i>
          <p>El reporte estara disponible al finalizar</p>
        </div>
      </section>
    </main>

    <div id="report-stage" class="report-stage" aria-hidden="true"></div>

    <script src="./vendor/lucide.min.js"></script>
    <script src="./vendor/html2canvas.min.js"></script>
    <script src="./vendor/jspdf.umd.min.js"></script>
    <script src="./vendor/js-yaml.min.js"></script>
    <script src="./app.js?v=20260605-8"></script>
  </body>
</html>
